        <h1>FarmPulse AI</h1>
        <p>
          FarmPulse AI is an agentic crop risk intelligence platform built for India's smallholder farming ecosystem.
          It combines district-level NDVI stress monitoring, weather analysis, pest-risk reasoning, multilingual farmer advisories,
          institutional reporting, and a full audit trail.
        </p>
        <h2>Main Routes</h2>
        <ul>
          <li><strong>/overview</strong>: command center dashboard with agent statuses, map views, and recent activity.</li>
          <li><strong>/districts</strong>: district-level explorer with risk reports, NDVI values, and advisory generation.</li>
          <li><strong>/farmer-advisory</strong>: multilingual farmer workflow focused on Maharashtra typed queries in Marathi.</li>
          <li><strong>/institutional</strong>: FPO, insurer, and government-facing reporting views.</li>
          <li><strong>/audit</strong>: chronological audit trail of every agent action and escalation.</li>
        </ul>
        <h2>Flagship Demo</h2>
        <p>
          The centerpiece flow simulates a farmer in Yavatmal, Maharashtra asking in Marathi about fertilizer timing.
          FarmPulse analyzes the typed or voice-assisted query, checks the district vegetation reference snapshot, soil conditions, and a 5-day forecast,
          then returns actionable guidance in the same language.
        </p>
